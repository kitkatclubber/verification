<!DOCTYPE html>
<html>
<head>
  <title>Verify</title>
</head>
<body>
  <h2>Verification</h2>

  <input id="roblox" placeholder="Roblox Username">
  <input id="discord" placeholder="Discord Username">
  <input id="code" placeholder="Verification Code">

  <button onclick="verify()">Verify</button>

  <p id="status"></p>

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCB2T7mR5BUkYIdT3fKoMVzsyzEw1xhpU0",
    authDomain: "products-39ab1.firebaseapp.com",
    projectId: "products-39ab1"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.verify = async function () {
    document.getElementById("status").innerText = "Verifying...";

    try {
      await addDoc(collection(db, "verifications"), {
        roblox: document.getElementById("roblox").value,
        discord: document.getElementById("discord").value,
        code: document.getElementById("code").value,
        status: "verified",
        time: Date.now()
      });

      setTimeout(() => {
        document.getElementById("status").innerText = "Successfully Verified";
      }, 2000);

    } catch (e) {
      document.getElementById("status").innerText = "Error verifying";
    }
  }
</script>
